[pytest]
# Default to unit tests only (safe to run without external dependencies)
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests using SQLite (fast, no external dependencies)
    integration: Integration tests using MySQL (requires Docker)

# To run integration tests, use: pytest -m integration
# To run unit tests: pytest -m unit (or just pytest)
# Never run both together without markers - they use different databases!
