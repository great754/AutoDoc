name: Backend Integration Tests

on:
  push:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-integration-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-integration-tests.yml"

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: autodoc
          MYSQL_USER: autodoc_user
          MYSQL_PASSWORD: autodoc_pass
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run integration tests
        working-directory: backend
        env:
          INTEGRATION_DATABASE_URL: mysql+pymysql://autodoc_user:autodoc_pass@127.0.0.1:3306/autodoc_test
        run: pytest -m integration -v
